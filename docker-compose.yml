services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./projects:/app/projects
      - ./workspaces:/app/workspaces
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
      - ~/.claude:/host-claude:ro        # Subscription auth credentials
      - ~/.claude.json:/host-claude.json:ro
      - ${HOME}:/host/home                # Host-Home für Dateibrowser
      - yolo-data:/app/data                 # SQLite database persistence
    environment:
      - YOLO_PROJECTS_DIR=/app/projects
      - YOLO_WORKSPACES_DIR=/app/workspaces
      - YOLO_CLAUDE_HOME=/host-claude
      - YOLO_CLAUDE_JSON=/host-claude.json
      - YOLO_CLAUDE_HOME_HOST=${HOME}/.claude
      - YOLO_CLAUDE_JSON_HOST=${HOME}/.claude.json
      - YOLO_BROWSE_ROOT=/host/home
      - YOLO_HOST_HOME_PATH=${HOME}
      - YOLO_DATABASE_PATH=/app/data/yolo_deck.db
      # Auth token (leave empty to disable auth)
      - YOLO_AUTH_TOKEN=${YOLO_AUTH_TOKEN:-}
      # Max concurrent container runs
      - YOLO_MAX_CONCURRENT_RUNS=${YOLO_MAX_CONCURRENT_RUNS:-3}
      # Optional: uncomment if using API key auth instead of subscription
      # - YOLO_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Ollama local LLM support (uncomment to override default)
      # - YOLO_OLLAMA_BASE_URL=http://host.docker.internal:11434
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    command: ["python", "run_telegram.py"]
    volumes:
      - ./projects:/app/projects
      - ./workspaces:/app/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.claude:/host-claude:ro
      - ~/.claude.json:/host-claude.json:ro
    environment:
      - YOLO_PROJECTS_DIR=/app/projects
      - YOLO_WORKSPACES_DIR=/app/workspaces
      - YOLO_CLAUDE_HOME=/host-claude
      - YOLO_CLAUDE_JSON=/host-claude.json
      - YOLO_TELEGRAM_BOT_TOKEN=${YOLO_TELEGRAM_BOT_TOKEN}
      - YOLO_TELEGRAM_ALLOWED_USERS=${YOLO_TELEGRAM_ALLOWED_USERS}
      - YOLO_TELEGRAM_API_BASE=http://backend:8000
      # Optional: uncomment if using API key auth instead of subscription
      # - YOLO_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

volumes:
  yolo-data:
